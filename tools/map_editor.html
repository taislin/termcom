<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Chunk Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Courier New', monospace; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; }
.preview-panel { width: 0; overflow: hidden; background: #0a0a14; border-left: 2px solid #0f3460; display: flex; flex-direction: column; transition: width 0.2s; }
.preview-panel.open { width: 320px; }
.preview-header { padding: 8px 12px; background: #0f3460; color: #a0c4ff; font-size: 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.preview-header button { background: #e94560; color: #fff; border: none; border-radius: 3px; padding: 2px 8px; cursor: pointer; font-family: inherit; font-size: 11px; }
.preview-body { flex: 1; overflow: auto; padding: 8px; display: flex; justify-content: center; }
.preview-body pre { font-family: 'Courier New', monospace; font-size: 14px; line-height: 1.0; letter-spacing: 0px; white-space: pre; margin: 0; }
.sidebar { width: 260px; min-width: 260px; background: #16213e; display: flex; flex-direction: column; border-right: 2px solid #0f3460; }
.sidebar h2 { padding: 12px; font-size: 14px; background: #0f3460; color: #e94560; text-align: center; letter-spacing: 1px; }
.tile-list { flex: 1; overflow-y: auto; padding: 4px; }
.tile-list::-webkit-scrollbar { width: 6px; }
.tile-list::-webkit-scrollbar-track { background: #16213e; }
.tile-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
.tile-item { display: flex; align-items: center; gap: 8px; padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 13px; transition: background 0.1s; }
.tile-item:hover { background: #1a3a5c; }
.tile-item.active { background: #0f3460; outline: 1px solid #e94560; }
.tile-item .preview { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 16px; border-radius: 2px; flex-shrink: 0; }
.tile-item .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tile-item .glyph { color: #888; font-size: 11px; margin-left: auto; }
.main { flex: 1; display: flex; flex-direction: column; }
.toolbar { display: flex; align-items: center; gap: 10px; padding: 8px 16px; background: #0f3460; flex-wrap: wrap; }
.toolbar label { font-size: 13px; color: #a0c4ff; }
.toolbar input[type=number] { width: 50px; padding: 4px 6px; background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; border-radius: 3px; font-family: inherit; font-size: 13px; }
.toolbar button { padding: 5px 14px; background: #e94560; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: bold; transition: background 0.15s; }
.toolbar button:hover { background: #ff6b81; }
.toolbar button.secondary { background: #0f3460; border: 1px solid #1a3a5c; }
.toolbar button.secondary:hover { background: #1a3a5c; }
.toolbar .spacer { flex: 1; }
.toolbar .info { font-size: 12px; color: #888; }
.canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 16px; background: #111; position: relative; }
.grid-container { display: inline-block; }
.grid-row { display: flex; }
.cell { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: crosshair; border: 1px solid #2a2a3e; transition: border-color 0.1s; user-select: none; position: relative; }
.cell:hover { border-color: #e94560; z-index: 1; }
.cell.empty { background: #1a1a2e; }
.cell .coord { position: absolute; font-size: 7px; color: rgba(255,255,255,0.15); bottom: 0; right: 1px; pointer-events: none; }
.toolbar .sel-preview { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; background: #1a1a2e; border-radius: 4px; font-size: 12px; }
.toolbar .sel-preview .swatch { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 13px; border-radius: 2px; }
#exportArea { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 80%; max-width: 800px; max-height: 80vh; background: #1a1a2e; border: 2px solid #0f3460; border-radius: 8px; z-index: 1000; flex-direction: column; }
#exportArea.show { display: flex; }
#exportArea textarea { width: 100%; height: 400px; background: #111; color: #0f0; border: none; padding: 12px; font-family: 'Courier New', monospace; font-size: 12px; resize: vertical; }
#exportArea .bar { display: flex; gap: 8px; padding: 8px 12px; align-items: center; background: #0f3460; }
#exportArea .bar button { padding: 5px 14px; background: #e94560; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 13px; }
#exportArea .bar span { flex: 1; color: #a0c4ff; font-size: 13px; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; }
.overlay.show { display: block; }
#loadInput { display: none; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>TILES</h2>
  <div class="tile-list" id="tileList"></div>
</div>

<div class="main">
  <div class="toolbar">
    <label>W:</label><input type="number" id="mapW" value="9" min="1" max="64">
    <label>H:</label><input type="number" id="mapH" value="9" min="1" max="64">
    <button id="resizeBtn">Resize</button>
    <button id="fillBtn" class="secondary">Fill</button>
    <button id="clearBtn" class="secondary">Clear</button>
    <span class="spacer"></span>
    <div class="sel-preview" id="selPreview"><span class="swatch" id="selSwatch">·</span><span id="selName">TileGrass</span></div>
    <button id="exportBtn">Export JSON</button>
    <button id="loadBtn" class="secondary">Load JSON</button>
    <button id="previewBtn" class="secondary">Preview</button>
    <input type="file" id="loadInput" accept=".json">
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <div class="grid-container" id="gridContainer"></div>
  </div>
</div>

<div class="preview-panel" id="previewPanel">
  <div class="preview-header">
    <span>Terminal Preview</span>
    <button id="closePreviewBtn">X</button>
  </div>
  <div class="preview-body"><pre id="previewPre"></pre></div>
</div>

<div class="overlay" id="overlay"></div>
<div id="exportArea">
  <div class="bar"><span>Export JSON</span><button id="copyBtn">Copy</button><button id="downloadBtn">Download</button><button id="closeExportBtn">Close</button></div>
  <textarea id="exportText" readonly></textarea>
</div>

const tileMap = {};
TILES.forEach(t => tileMap[t.id] = t);

// ===== STATE =====
let grid = [];
let selTile = TILES.find(t => t.id === "TileGrass");
let w = 9, h = 9;

function initGrid() {
  grid = [];
  for (let y = 0; y < h; y++) {
    grid[y] = [];
    for (let x = 0; x < w; x++) {
      grid[y][x] = "TileGrass";
    }
  }
}

function renderTileList() {
  const el = document.getElementById("tileList");
  el.innerHTML = "";
  TILES.forEach(t => {
    const div = document.createElement("div");
    div.className = "tile-item" + (selTile && selTile.id === t.id ? " active" : "");
    div.innerHTML = `<div class="preview" style="background:${t.c};color:#fff;text-shadow:0 0 2px #000">${t.g}</div><span class="name">${t.id.replace("Tile","")}</span><span class="glyph">${t.g.charCodeAt(0).toString(16).toUpperCase()}</span>`;
    div.addEventListener("click", () => selectTile(t.id));
    el.appendChild(div);
  });
}

function selectTile(id) {
  selTile = tileMap[id] || TILES[0];
  document.querySelectorAll(".tile-item").forEach(el => el.classList.remove("active"));
  const items = document.querySelectorAll(".tile-item");
  const idx = TILES.indexOf(selTile);
  if (items[idx]) items[idx].classList.add("active");
  document.getElementById("selSwatch").textContent = selTile.g;
  document.getElementById("selSwatch").style.background = selTile.c;
  document.getElementById("selName").textContent = selTile.id;
}

function renderGrid() {
  const container = document.getElementById("gridContainer");
  container.innerHTML = "";
  container.style.gridTemplateColumns = `repeat(${w}, 28px)`;
  for (let y = 0; y < h; y++) {
    const row = document.createElement("div");
    row.className = "grid-row";
    for (let x = 0; x < w; x++) {
      const id = grid[y][x] || "TileGrass";
      const t = tileMap[id] || TILES[0];
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.dataset.x = x;
      cell.dataset.y = y;
      cell.textContent = t.g;
      cell.style.background = t.c;
      cell.style.color = "#fff";
      cell.style.textShadow = "0 0 2px #000";
      // Darken empty-style tiles for contrast
      if (t.id === "TileGrass" || t.id === "TileSand" || t.id === "TileScree") {
        cell.style.color = "rgba(255,255,255,0.3)";
      }
      const coord = document.createElement("span");
      coord.className = "coord";
      coord.textContent = x+","+y;
      cell.appendChild(coord);
      cell.addEventListener("click", () => placeTile(x, y));
      cell.addEventListener("contextmenu", e => { e.preventDefault(); placeTile(x, y, true); });
      row.appendChild(cell);
    }
    container.appendChild(row);
  }
  updateInfo();
  renderPreview();
}

function placeTile(x, y, erase) {
  if (!selTile) return;
  grid[y][x] = erase ? "TileGrass" : selTile.id;
  renderGrid();
  // restore selection highlight
  selectTile(selTile.id);
}

function renderPreview() {
  const pre = document.getElementById("previewPre");
  if (!pre) return;
  const fragment = document.createDocumentFragment();
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const id = grid[y][x] || "TileGrass";
      const t = tileMap[id] || TILES[0];
      const span = document.createElement("span");
      span.textContent = t.g;
      span.style.color = t.c;
      fragment.appendChild(span);
    }
    if (y < h - 1) fragment.appendChild(document.createTextNode("\n"));
  }
  pre.textContent = "";
  pre.appendChild(fragment);
}

function updateInfo() {
  const used = new Set();
  let count = 0;
  for (let y = 0; y < h; y++)
    for (let x = 0; x < w; x++) {
      used.add(grid[y][x]);
      count++;
    }
  // no info bar for now
}

// ===== EXPORT =====
function exportJSON() {
  // Determine used glyphs
  const usedGlyphs = {};
  const terrain = {};
  const furniture = {};
  for (let y = 0; y < h; y++)
    for (let x = 0; x < w; x++) {
      const id = grid[y][x] || "TileGrass";
      const t = tileMap[id];
      if (!t || id === "TileGrass") continue;
      // Assign a unique glyph based on tile type index
      // Use a single letter/digit if possible, otherwise use the tile's glyph
      let glyph;
      // Use a consistent glyph per tile type across the chunk
      if (!usedGlyphs[id]) {
        // Try first letter of the name after Tile
        let name = id.replace("Tile","");
        let ch = name[0].toLowerCase();
        // Avoid collision with reserved chars for base terrain
        if (".#+·♣∩≈≡▒▓░∗≋†│•".includes(ch) || Object.values(usedGlyphs).includes(ch) || ch === 'h') {
          // Use a unique starting char
          ch = String.fromCharCode(97 + Object.keys(usedGlyphs).length);
        }
        // Actually just use the tile's rune character directly since the terrain/furniture map is explicit
        ch = t.g;
        // But if two different tile types share the same glyph (like ♣ used by Tree/Cypress/SnowTree/Bamboo),
        // we need to disambiguate. Use a unique letter.
        // Instead: assign unique ASCII glyphs for all used tiles
        const keys = Object.keys(usedGlyphs);
        const idx = keys.length;
        if (idx < 26) ch = String.fromCharCode(97 + idx);
        else if (idx < 52) ch = String.fromCharCode(65 + idx - 26);
        else ch = String.fromCharCode(48 + idx - 52);
        usedGlyphs[id] = ch;
      }
      glyph = usedGlyphs[id];
      if (t.pa) {
        terrain[glyph] = id;
      } else {
        furniture[glyph] = id;
      }
    }

  // Build rows
  const rows = [];
  for (let y = 0; y < h; y++) {
    let row = "";
    for (let x = 0; x < w; x++) {
      const id = grid[y][x] || "TileGrass";
      if (id === "TileGrass") {
        row += ".";
      } else {
        row += usedGlyphs[id] || ".";
      }
    }
    rows.push(row);
  }

  const tags = ["farm"];
  const chunk = {
    id: "custom_chunk",
    tags: tags,
    width: w,
    height: h,
    rows: rows,
    terrain: Object.fromEntries(Object.entries(usedGlyphs || {}).filter(([g,id]) => tileMap[id] && tileMap[id].pa).map(([g,id]) => [g,id])),
    furniture: Object.fromEntries(Object.entries(usedGlyphs || {}).filter(([g,id]) => tileMap[id] && !tileMap[id].pa).map(([g,id]) => [g,id]))
  };
  if (Object.keys(chunk.furniture).length === 0) chunk.furniture = {};

  return JSON.stringify(chunk, null, 2);
}

// ===== UI EVENTS =====
document.addEventListener("DOMContentLoaded", () => {
  const wIn = document.getElementById("mapW");
  const hIn = document.getElementById("mapH");
  w = parseInt(wIn.value) || 9;
  h = parseInt(hIn.value) || 9;
  initGrid();
  renderTileList();
  renderGrid();
  renderPreview();
  selectTile("TileGrass");

  document.getElementById("resizeBtn").addEventListener("click", () => {
    w = parseInt(wIn.value) || 9;
    h = parseInt(hIn.value) || 9;
    if (w < 1) w = 1; if (w > 64) w = 64;
    if (h < 1) h = 1; if (h > 64) h = 64;
    wIn.value = w; hIn.value = h;
    const newGrid = [];
    for (let y = 0; y < h; y++) {
      newGrid[y] = [];
      for (let x = 0; x < w; x++) {
        newGrid[y][x] = (grid[y] && grid[y][x]) ? grid[y][x] : "TileGrass";
      }
    }
    grid = newGrid;
    renderGrid();
  });

  document.getElementById("clearBtn").addEventListener("click", () => {
    initGrid();
    renderGrid();
  });

  document.getElementById("fillBtn").addEventListener("click", () => {
    if (!selTile) return;
    for (let y = 0; y < h; y++)
      for (let x = 0; x < w; x++)
        grid[y][x] = selTile.id;
    renderGrid();
    selectTile(selTile.id);
  });

  // Export
  const exportArea = document.getElementById("exportArea");
  const overlay = document.getElementById("overlay");
  document.getElementById("exportBtn").addEventListener("click", () => {
    document.getElementById("exportText").value = exportJSON();
    exportArea.classList.add("show");
    overlay.classList.add("show");
  });
  document.getElementById("closeExportBtn").addEventListener("click", () => {
    exportArea.classList.remove("show");
    overlay.classList.remove("show");
  });
  overlay.addEventListener("click", () => {
    exportArea.classList.remove("show");
    overlay.classList.remove("show");
  });
  document.getElementById("copyBtn").addEventListener("click", () => {
    const ta = document.getElementById("exportText");
    ta.select();
    document.execCommand("copy");
  });
  document.getElementById("downloadBtn").addEventListener("click", () => {
    const blob = new Blob([document.getElementById("exportText").value], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "custom_chunk.json";
    a.click();
  });

  // Load
  document.getElementById("loadBtn").addEventListener("click", () => {
    document.getElementById("loadInput").click();
  });
  document.getElementById("loadInput").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.rows || !data.width || !data.height) {
          alert("Invalid chunk JSON: missing rows, width, or height");
          return;
        }
        w = data.width;
        h = data.height;
        document.getElementById("mapW").value = w;
        document.getElementById("mapH").value = h;
        const terrain = data.terrain || {};
        const furniture = data.furniture || {};
        const tmap = {...terrain, ...furniture};
        // Reverse map: glyph -> TileType name
        const rev = {};
        for (const [glyph, tid] of Object.entries(tmap)) {
          rev[glyph] = tid;
        }
        grid = [];
        for (let y = 0; y < h; y++) {
          grid[y] = [];
          for (let x = 0; x < w; x++) {
            const ch = data.rows[y] ? data.rows[y][x] : ".";
            // default terrain glyphs
            const defaultTerrain = { ".":"TileFloor", "#":"TileWall", "+":"TileDoor", "\u229E":"TileWindow", "\u00B7":"TileGrass", "\u2663":"TileTree", "\u2229":"TileRock", "\u2248":"TileWater", "\u2261":"TileUFOFloor", "\u2588":"TileUFOWall", "\u2592":"TileStairs", "\u2593":"TileStairsDown", "\u2591":"TilePavement", "\u2217":"TileSnow", "\u224B":"TileMarsh", "\u2020":"TileBush", "\u2502":"TileFence", "\u2022":"TileObject" };
            grid[y][x] = rev[ch] || defaultTerrain[ch] || "TileGrass";
          }
        }
        renderGrid();
        exportArea.classList.remove("show");
        overlay.classList.remove("show");
      } catch(err) {
        alert("Error loading JSON: " + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  });

  // Preview toggle
  document.getElementById("previewBtn").addEventListener("click", () => {
    document.getElementById("previewPanel").classList.toggle("open");
    renderPreview();
  });
  document.getElementById("closePreviewBtn").addEventListener("click", () => {
    document.getElementById("previewPanel").classList.remove("open");
  });

  // click on empty area clears selection (toggle grass)
  // already handled
});
</script>
</body>
</html>
