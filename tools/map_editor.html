<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Courier New', monospace; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }

/* Sidebar - Tile Palette */
.sidebar { width: 210px; min-width: 210px; background: #16213e; display: flex; flex-direction: column; border-right: 2px solid #0f3460; }
.sidebar h2 { padding: 8px; font-size: 13px; background: #0f3460; color: #e94560; text-align: center; letter-spacing: 1px; flex-shrink: 0; display: flex; align-items: center; gap: 4px; }
.sidebar h2 .ct-btn { margin-left: auto; background: none; border: 1px solid #e94560; color: #e94560; border-radius: 3px; cursor: pointer; font-size: 10px; padding: 1px 6px; font-family: inherit; }
.sidebar h2 .ct-btn:hover { background: #e94560; color: #fff; }
.sidebar h2 .ct-count { font-size: 9px; color: #a0c4ff; font-weight: normal; letter-spacing: 0; }
.tile-list { flex: 1; overflow-y: auto; padding: 2px; }
.tile-list::-webkit-scrollbar { width: 5px; }
.tile-list::-webkit-scrollbar-track { background: #16213e; }
.tile-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
.tile-item { display: flex; align-items: center; gap: 5px; padding: 2px 6px; cursor: pointer; border-radius: 3px; font-size: 11px; transition: background 0.1s; }
.tile-item:hover { background: #1a3a5c; }
.tile-item.active { background: #0f3460; outline: 1px solid #e94560; }
.tile-item .pvw { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 2px; flex-shrink: 0; }
.tile-item .nm { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

/* Main area */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.toolbar { display: flex; align-items: center; gap: 6px; padding: 5px 10px; background: #0f3460; flex-wrap: wrap; font-size: 12px; flex-shrink: 0; }
.toolbar label { color: #a0c4ff; font-size: 11px; }
.toolbar input[type=number] { width: 40px; padding: 2px 4px; background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0; border-radius: 3px; font-family: inherit; font-size: 12px; }
.toolbar button { padding: 3px 10px; background: #e94560; color: #fff; border: none; border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: bold; }
.toolbar button:hover { background: #ff6b81; }
.toolbar button.sc { background: #0f3460; border: 1px solid #1a3a5c; }
.toolbar button.sc:hover { background: #1a3a5c; }
.toolbar .mode-group { display: flex; gap: 0; }
.toolbar .mode-btn { padding: 3px 8px; background: #1a1a2e; border: 1px solid #0f3460; color: #888; cursor: pointer; font-family: inherit; font-size: 11px; }
.toolbar .mode-btn:first-child { border-radius: 3px 0 0 3px; }
.toolbar .mode-btn:last-child { border-radius: 0 3px 3px 0; }
.toolbar .mode-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
.toolbar .sel-info { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: #1a1a2e; border-radius: 3px; font-size: 11px; }
.toolbar .sel-info .swatch { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 2px; }
.toolbar .spacer { flex: 1; }

/* Chunk library panel */
.chunk-panel { width: 0; min-width: 0; background: #16213e; border-left: 2px solid #0f3460; display: flex; flex-direction: column; transition: width 0.15s; overflow: hidden; }
.chunk-panel.open { width: 280px; min-width: 280px; }
.chunk-header { padding: 6px 8px; background: #0f3460; color: #a0c4ff; font-size: 11px; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.chunk-header button { padding: 2px 7px; background: #e94560; color: #fff; border: none; border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 10px; font-weight: bold; }
.chunk-header button.sm { background: #1a1a2e; border: 1px solid #0f3460; }
.chunk-header .spcr { flex: 1; }
.chunk-body { flex: 1; overflow-y: auto; padding: 4px; }
.chunk-body::-webkit-scrollbar { width: 5px; }
.chunk-body::-webkit-scrollbar-track { background: #16213e; }
.chunk-body::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
.chunk-item { display: flex; align-items: center; gap: 6px; padding: 4px; cursor: pointer; border-radius: 4px; border: 1px solid transparent; margin-bottom: 3px; transition: all 0.1s; }
.chunk-item:hover { background: #1a3a5c; }
.chunk-item.active { border-color: #e94560; background: #0f3460; }
.chunk-item .minimap { display: grid; gap: 1px; flex-shrink: 0; }
.chunk-item .minimap .mpixel { width: 6px; height: 6px; border-radius: 1px; }
.chunk-item .info { flex: 1; min-width: 0; }
.chunk-item .info .cid { font-size: 11px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chunk-item .info .cdim { font-size: 10px; color: #888; }
.chunk-item .rm { background: none; border: none; color: #e94560; cursor: pointer; font-size: 14px; padding: 0 4px; }

/* Canvas / Grid */
.canvas-wrap { flex: 1; overflow: auto; background: #111; position: relative; display: flex; }
.canvas-wrap::-webkit-scrollbar { width: 8px; height: 8px; }
.canvas-wrap::-webkit-scrollbar-track { background: #111; }
.canvas-wrap::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }
.grid-container { margin: auto; display: inline-block; }
.grid-row { display: flex; }
.cell { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 11px; cursor: crosshair; border: 1px solid #202030; position: relative; user-select: none; transition: border-color 0.05s; }
.cell:hover { border-color: #e94560; z-index: 1; }
.cell .cl { position: absolute; font-size: 6px; color: rgba(255,255,255,0.08); bottom: 0; right: 1px; pointer-events: none; }

/* Export overlay */
.export-area { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 70%; max-width: 700px; max-height: 80vh; background: #1a1a2e; border: 2px solid #0f3460; border-radius: 8px; z-index: 1000; flex-direction: column; }
.export-area.show { display: flex; }
.export-area textarea { width: 100%; height: 350px; background: #111; color: #0f0; border: none; padding: 10px; font-family: 'Courier New', monospace; font-size: 11px; resize: vertical; }
.export-area .bar { display: flex; gap: 6px; padding: 6px 10px; align-items: center; background: #0f3460; }
.export-area .bar button { padding: 3px 10px; background: #e94560; color: #fff; border: none; border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 11px; }
.export-area .bar span { flex: 1; color: #a0c4ff; font-size: 12px; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; }
.overlay.show { display: block; }
#chunkFileInput, #mapFileInput { display: none; }
.toolbar .chunk-btn { background: #283a6e; border-color: #3a5a9e; }
.toolbar .chunk-btn:hover { background: #3a5a9e; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>TILES<button class="ct-btn" id="loadTilesBtn">+Custom</button><span class="ct-count" id="ctCount"></span></h2>
  <div class="tile-list" id="tileList"></div>
</div>
<input type="file" id="tilesInput" accept=".json" style="display:none">

<!-- Main -->
<div class="main">
  <div class="toolbar">
    <label>W:</label><input type="number" id="mapW" value="50" min="1" max="120">
    <label>H:</label><input type="number" id="mapH" value="50" min="1" max="120">
    <button id="resizeBtn">Resize</button>
    <button id="fillBtn" class="sc">Fill</button>
    <button id="clearBtn" class="sc">Clear</button>
    <div class="mode-group">
      <button class="mode-btn active" data-mode="tile">Tile</button>
      <button class="mode-btn" data-mode="chunk">Chunk</button>
    </div>
    <span class="spacer"></span>
    <div class="sel-info" id="selInfo"><span class="swatch" id="selSwatch">&#183;</span><span id="selName">TileGrass</span></div>
    <button id="exportBtn">Export</button>
    <button id="loadMapBtn" class="sc">Load Map</button>
    <button id="chunkToggleBtn" class="sc chunk-btn">Chunks</button>
    <input type="file" id="mapFileInput" accept=".json">
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <div class="grid-container" id="gridContainer"></div>
  </div>
</div>

<!-- Chunk panel -->
<div class="chunk-panel" id="chunkPanel">
  <div class="chunk-header">
    <span>Chunk Library</span>
    <span class="spcr"></span>
    <button id="loadChunksBtn" style="background:#283a6e;border:1px solid #3a5a9e;">Load</button>
    <button class="sm" id="clearChunksBtn">X</button>
  </div>
  <div class="chunk-body" id="chunkBody">
    <div style="color:#555;font-size:11px;padding:12px;text-align:center;">Load chunk JSONs<br>from data/maps/ to begin</div>
  </div>
  <input type="file" id="chunkFileInput" accept=".json" multiple>
</div>

<!-- Export overlay -->
<div class="overlay" id="overlay"></div>
<div class="export-area" id="exportArea">
  <div class="bar"><span id="exportTitle">Export Map</span><button id="copyBtn">Copy</button><button id="downloadBtn">Download</button><button id="closeExportBtn">Close</button></div>
  <textarea id="exportText" readonly></textarea>
</div>

<script>
// ===== TILE DEFINITIONS =====
const TILES = [
  { id:"TileFloor",      g:'.',  c:"#5f5a55", pa:1, op:0, de:0, cv:0 },
  { id:"TileWall",       g:'#',  c:"#a09b96", pa:0, op:1, de:1, cv:80 },

  { id:"TileCabinet",    g:'\u229E', c:"#aa825a", pa:1, op:0, de:1, cv:30 },
  { id:"TileCar",        g:'\u2584', c:"#3264b4", pa:0, op:1, de:1, cv:50 },
  { id:"TileCarMid",     g:'\u2588', c:"#3264b4", pa:0, op:1, de:1, cv:50 },
  { id:"TileCarRight",   g:'\u2584', c:"#3264b4", pa:0, op:1, de:1, cv:50 },
  { id:"TileForklift",   g:'\u2588', c:"#c8a028", pa:0, op:1, de:1, cv:50 },
  { id:"TileForkliftRight",g:'\u228F',c:"#c8a028", pa:0, op:1, de:1, cv:50 },
  { id:"TileFuelPump",   g:'8',      c:"#c83c28", pa:0, op:1, de:1, cv:30 },
  { id:"TileContainerRed",g:'\u2588',c:"#b43228", pa:0, op:1, de:0, cv:80 },
  { id:"TileContainerBlue",g:'\u2588',c:"#3250b4", pa:0, op:1, de:0, cv:80 },
  { id:"TileContainerYellow",g:'\u2588',c:"#c8aa28", pa:0, op:1, de:0, cv:80 },
  { id:"TileBusEnd",     g:'\u2584', c:"#c8b43c", pa:0, op:1, de:1, cv:50 },
  { id:"TileBusMid",     g:'\u2588', c:"#c8b43c", pa:0, op:1, de:1, cv:50 },
  { id:"TileHeloBody",   g:'\u2588', c:"#3c4655", pa:0, op:1, de:1, cv:50 },
  { id:"TileHeloTail",   g:'\u2584', c:"#3c4655", pa:0, op:1, de:1, cv:30 },
  { id:"TileHeloNose",   g:'\u25B7', c:"#82c8e6", pa:0, op:1, de:1, cv:40 },
  { id:"TileHeloRotor",  g:'+',      c:"#b4b4b4", pa:1, op:0, de:1, cv:0 },
  { id:"TileHeloRotorSides",g:'-',   c:"#b4b4b4", pa:1, op:0, de:1, cv:0 },
  { id:"TileHeloBodyBack",g:'\u2588',c:"#3c4655", pa:0, op:1, de:1, cv:50 },
  { id:"TileHeloRotorBack",g:'x',    c:"#b4b4b4", pa:1, op:0, de:1, cv:0 },
  { id:"TileHeloWindow", g:'\u25E3', c:"#82c8e6", pa:0, op:1, de:1, cv:0 },

  { id:"TileTractorBody",g:'\u2588', c:"#b43c28", pa:0, op:1, de:1, cv:30 },

  { id:"TileCrawlerMid", g:'\u2588', c:"#8246be", pa:0, op:1, de:1, cv:50 },
  { id:"TileCrawlerRight",g:'\u25E3',c:"#8246be", pa:0, op:1, de:1, cv:50 },
  { id:"TileCrawlerLeg", g:'^',      c:"#6432a0", pa:0, op:1, de:1, cv:20 },
  { id:"TileWheel",      g:'O',      c:"#3c3c3c", pa:0, op:0, de:1, cv:10 },
  { id:"TileWheelSmall", g:'o',      c:"#3c3c3c", pa:0, op:0, de:1, cv:10 },
  { id:"TileAdobe",      g:'\u2588', c:"#c88246", pa:0, op:1, de:0, cv:80 },
  { id:"TileMetalWall",  g:'\u2588', c:"#b4b9c3", pa:0, op:1, de:0, cv:80 },
  { id:"TileWreck",      g:'\u25A4', c:"#965f3c", pa:0, op:1, de:0, cv:80 },
  { id:"TileTimber",     g:'\u2261', c:"#966e3c", pa:0, op:1, de:1, cv:80 },
  { id:"TileDish",       g:'\u25D7', c:"#aaafb9", pa:0, op:1, de:0, cv:50 },
  { id:"TileTruck",      g:'\u2584', c:"#5a6e46", pa:0, op:1, de:1, cv:80 },
  { id:"TileIce",        g:'\u2248', c:"#b4dceb", pa:1, op:0, de:0, cv:0 },
  { id:"TileStreetlamp", g:'\u2316', c:"#dcd278", pa:0, op:0, de:1, cv:10 },
  { id:"TileGlass",      g:',',      c:"#bec8d2", pa:1, op:0, de:1, cv:0 },
  { id:"TileDebris",     g:'`',      c:"#968c82", pa:1, op:0, de:1, cv:0 },
  { id:"TileCryoPipe",   g:'\u256A', c:"#8cc8e6", pa:0, op:0, de:1, cv:20 },
  { id:"TileSkylight",   g:'\u2299', c:"#b4d2f0", pa:1, op:0, de:1, cv:0 },
  { id:"TileWheat",      g:'\u03C8', c:"#c8b43c", pa:1, op:0, de:1, cv:20 },
  { id:"TileHayBale",    g:'\u2588', c:"#a08c3c", pa:0, op:1, de:1, cv:60 },
  { id:"TilePier",       g:'\u2550', c:"#8c643c", pa:1, op:0, de:0, cv:10 },
  { id:"TileDockCrate",  g:'\u25A3', c:"#967850", pa:0, op:1, de:1, cv:50 },
  { id:"TileCliffFace",  g:'\u2591', c:"#8c7864", pa:0, op:1, de:0, cv:80 },
  { id:"TileScree",      g:'\u00B7', c:"#a09682", pa:1, op:0, de:1, cv:10 },
  { id:"TileBoulder",    g:'\u2229', c:"#827d78", pa:0, op:1, de:0, cv:70 },
  { id:"TileSwampWater", g:'\u224B', c:"#326450", pa:1, op:0, de:0, cv:5 },
  { id:"TileCypressTree",g:'\u2663', c:"#285532", pa:0, op:1, de:1, cv:80 },
  { id:"TileSnowTree",   g:'\u2663', c:"#dcebf5", pa:0, op:1, de:1, cv:80 },
  { id:"TileMud",        g:'\u224B', c:"#6e5032", pa:1, op:0, de:0, cv:5 },
  { id:"TileVine",       g:'\u2021', c:"#328232", pa:1, op:0, de:1, cv:20 },
  { id:"TileBamboo",     g:'\u2663', c:"#50963c", pa:0, op:1, de:1, cv:60 },
  { id:"TileDryBush",    g:'*',      c:"#aa8c3c", pa:1, op:0, de:1, cv:20 },
];

const tileMap = {};
TILES.forEach(t => tileMap[t.id] = t);
let customTiles = [];

// ===== STATE =====
let grid = [];
let selTile = TILES.find(t => t.id === "TileGrass");
let currentMode = "tile";
let selChunk = null;
let loadedChunks = [];
let w = 50, h = 50;

function initGrid() {
  grid = [];
  for (let y = 0; y < h; y++) {
    grid[y] = [];
    for (let x = 0; x < w; x++) grid[y][x] = "TileGrass";
  }
}

// ===== RENDER TILE LIST =====
function renderTileList() {
  const el = document.getElementById("tileList");
  el.innerHTML = "";
  const allTiles = [...TILES, ...customTiles];
  allTiles.forEach((t, i) => {
    if (i === TILES.length && customTiles.length > 0) {
      const sep = document.createElement("div");
      sep.style.cssText = "font-size:9px;color:#e94560;padding:4px 8px;border-top:1px solid #e94560;margin-top:2px;";
      sep.textContent = "\u2500 CUSTOM \u2500";
      el.appendChild(sep);
    }
    const div = document.createElement("div");
    div.className = "tile-item" + (selTile && selTile.id === t.id ? " active" : "");
    div.dataset.tileId = t.id;
    div.innerHTML = `<div class="pvw" style="background:${t.c};color:#fff;text-shadow:0 0 2px #000">${t.g}</div><span class="nm">${t.id.replace("Tile","")}</span>`;
    div.addEventListener("click", () => selectTile(t.id));
    div.addEventListener("dblclick", () => selectTile(t.id));
    el.appendChild(div);
  });
  document.getElementById("ctCount").textContent = customTiles.length ? "+"+customTiles.length : "";
}

function selectTile(id) {
  selTile = tileMap[id] || TILES[0];
  document.querySelectorAll(".tile-item").forEach(el => {
    el.classList.toggle("active", el.dataset.tileId === selTile.id);
  });
  document.getElementById("selSwatch").textContent = selTile.g;
  document.getElementById("selSwatch").style.background = selTile.c;
  document.getElementById("selName").textContent = selTile.id;
}

// ===== RENDER GRID =====
function renderGrid() {
  const container = document.getElementById("gridContainer");
  container.innerHTML = "";
  for (let y = 0; y < h; y++) {
    const row = document.createElement("div");
    row.className = "grid-row";
    for (let x = 0; x < w; x++) {
      const id = grid[y][x] || "TileGrass";
      const t = tileMap[id] || TILES[0];
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.dataset.x = x;
      cell.dataset.y = y;
      cell.textContent = t.g;
      cell.style.background = t.c;
      cell.style.color = "#fff";
      cell.style.textShadow = "0 0 2px #000";
      if (t.id === "TileGrass" || t.id === "TileSand" || t.id === "TileScree")
        cell.style.color = "rgba(255,255,255,0.25)";
      const cl = document.createElement("span");
      cl.className = "cl";
      cl.textContent = x+","+y;
      cell.appendChild(cl);
      cell.addEventListener("mousedown", e => {
        e.preventDefault();
        if (e.button === 2) { eraseCell(x, y); return; }
        handleCellClick(x, y);
      });
      cell.addEventListener("contextmenu", e => e.preventDefault());
      row.appendChild(cell);
    }
    container.appendChild(row);
  }
}

function handleCellClick(x, y) {
  if (currentMode === "tile") {
    if (selTile) grid[y][x] = selTile.id;
  } else {
    stampChunk(x, y);
  }
  renderGrid();
  if (currentMode === "tile") selectTile(selTile.id);
}

function eraseCell(x, y) {
  grid[y][x] = "TileGrass";
  renderGrid();
  if (currentMode === "tile") selectTile(selTile.id);
}

// ===== CHUNK STAMPING =====
const defaultGlyphMap = {
  ".": "TileFloor", "#": "TileWall", "+": "TileDoor", "\u229E": "TileWindow",
  "\u00B7": "TileGrass", "\u2663": "TileTree", "\u2229": "TileRock",
  "\u2248": "TileWater", "\u2261": "TileUFOFloor", "\u2588": "TileUFOWall",
  "\u2592": "TileStairs", "\u2593": "TileStairsDown", "\u2591": "TilePavement",
  "\u2217": "TileSnow", "\u224B": "TileMarsh", "\u2020": "TileBush",
  "\u2502": "TileFence", "\u2022": "TileObject", "W": "TileWall",
  "g": "TileGrass", "t": "TileTree", "r": "TileRock", "s": "TileSand",
  "n": "TileSnow", "~": "TileWater", "R": "TileRubble", "D": "TileDoor",
  "C": "TileConsole", "M": "TileMachinery", "P": "TilePod",
  "X": "TilePowerSource", "S": "TileStorage", "B": "TileBed", "A": "TileAlienTech"
};

function stampChunk(cx, cy) {
  if (!selChunk) return;
  const chunk = selChunk;
  for (let y = 0; y < chunk.height; y++) {
    for (let x = 0; x < chunk.width; x++) {
      const glyph = chunk.rows[y][x];
      if (glyph === ' ') continue;
      let tileId = chunk.terrain && chunk.terrain[glyph];
      if (!tileId) tileId = chunk.furniture && chunk.furniture[glyph];
      if (!tileId) tileId = defaultGlyphMap[glyph];
      if (!tileId) continue;
      const mx = cx + x;
      const my = cy + y;
      if (mx >= 0 && mx < w && my >= 0 && my < h) {
        grid[my][mx] = tileId;
      }
    }
  }
}

// ===== CHUNK LIBRARY =====
function renderChunkLibrary() {
  const body = document.getElementById("chunkBody");
  if (loadedChunks.length === 0) {
    body.innerHTML = '<div style="color:#555;font-size:11px;padding:12px;text-align:center;">Load chunk JSONs<br>from data/maps/ to begin</div>';
    return;
  }
  body.innerHTML = "";
  loadedChunks.forEach((chunk, idx) => {
    const item = document.createElement("div");
    item.className = "chunk-item" + (selChunk === chunk ? " active" : "");

    // Mini map
    const mini = document.createElement("div");
    mini.className = "minimap";
    const mw = Math.min(chunk.width, 20);
    const mh = Math.min(chunk.height, 20);
    mini.style.gridTemplateColumns = `repeat(${mw}, 6px)`;
    for (let y = 0; y < mh; y++) {
      for (let x = 0; x < mw; x++) {
        const glyph = chunk.rows[y][x];
        let tileId = chunk.terrain && chunk.terrain[glyph];
        if (!tileId) tileId = chunk.furniture && chunk.furniture[glyph];
        if (!tileId) tileId = defaultGlyphMap[glyph];
        const t = tileMap[tileId] || TILES[0];
        const pix = document.createElement("div");
        pix.className = "mpixel";
        pix.style.background = t.c;
        mini.appendChild(pix);
      }
    }

    const info = document.createElement("div");
    info.className = "info";
    info.innerHTML = `<div class="cid">${chunk.id}</div><div class="cdim">${chunk.width}\u00D7${chunk.height} ${chunk.tags ? chunk.tags.join(", ") : ""}</div>`;

    const rm = document.createElement("button");
    rm.className = "rm";
    rm.textContent = "\u00D7";
    rm.title = "Remove";
    rm.addEventListener("click", e => { e.stopPropagation(); loadedChunks.splice(idx, 1); if (selChunk === chunk) selChunk = null; renderChunkLibrary(); });

    item.appendChild(mini);
    item.appendChild(info);
    item.appendChild(rm);
    item.addEventListener("click", () => {
      selChunk = chunk;
      document.getElementById("selSwatch").textContent = "\u25A0";
      document.getElementById("selSwatch").style.background = "#e94560";
      document.getElementById("selName").textContent = chunk.id + " (" + chunk.width + "\u00D7" + chunk.height + ")";
      renderChunkLibrary();
    });
    body.appendChild(item);
  });
}

// ===== EXPORT =====
function exportMap() {
  const tiles = [];
  for (let y = 0; y < h; y++) {
    const row = [];
    for (let x = 0; x < w; x++) {
      row.push(grid[y][x] || "TileGrass");
    }
    tiles.push(row);
  }
  return JSON.stringify({ width: w, height: h, tiles: tiles }, null, 2);
}

function loadMapJSON(data) {
  if (!data.tiles || !data.width || !data.height) {
    alert("Invalid map JSON: missing width, height, or tiles");
    return false;
  }
  w = data.width;
  h = data.height;
  document.getElementById("mapW").value = w;
  document.getElementById("mapH").value = h;
  grid = [];
  for (let y = 0; y < h; y++) {
    grid[y] = [];
    for (let x = 0; x < w; x++) {
      const id = data.tiles[y] && data.tiles[y][x];
      grid[y][x] = tileMap[id] ? id : "TileGrass";
    }
  }
  return true;
}

// ===== UI EVENTS =====
document.addEventListener("DOMContentLoaded", () => {
  const wIn = document.getElementById("mapW");
  const hIn = document.getElementById("mapH");
  w = parseInt(wIn.value) || 50;
  h = parseInt(hIn.value) || 50;
  initGrid();
  renderTileList();
  renderGrid();
  selectTile("TileGrass");

  // Resize
  document.getElementById("resizeBtn").addEventListener("click", () => {
    const nw = Math.max(1, Math.min(120, parseInt(wIn.value) || 50));
    const nh = Math.max(1, Math.min(120, parseInt(hIn.value) || 50));
    wIn.value = nw; hIn.value = nh;
    const ng = [];
    for (let y = 0; y < nh; y++) {
      ng[y] = [];
      for (let x = 0; x < nw; x++) {
        ng[y][x] = (grid[y] && grid[y][x]) ? grid[y][x] : "TileGrass";
      }
    }
    grid = ng; w = nw; h = nh;
    renderGrid();
  });

  // Fill
  document.getElementById("fillBtn").addEventListener("click", () => {
    if (!selTile) return;
    for (let y = 0; y < h; y++)
      for (let x = 0; x < w; x++)
        grid[y][x] = selTile.id;
    renderGrid();
    selectTile(selTile.id);
  });

  // Clear
  document.getElementById("clearBtn").addEventListener("click", () => {
    initGrid();
    renderGrid();
  });

  // Mode toggle
  document.querySelectorAll(".mode-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentMode = btn.dataset.mode;
      if (currentMode === "tile") {
        selectTile(selTile ? selTile.id : "TileGrass");
      } else if (selChunk) {
        document.getElementById("selSwatch").textContent = "\u25A0";
        document.getElementById("selSwatch").style.background = "#e94560";
        document.getElementById("selName").textContent = selChunk.id;
      } else {
        document.getElementById("selSwatch").textContent = "?";
        document.getElementById("selSwatch").style.background = "#555";
        document.getElementById("selName").textContent = "Select a chunk";
      }
    });
  });

  // Chunk panel toggle
  document.getElementById("chunkToggleBtn").addEventListener("click", () => {
    document.getElementById("chunkPanel").classList.toggle("open");
  });

  // Load chunks
  document.getElementById("loadChunksBtn").addEventListener("click", () => {
    document.getElementById("chunkFileInput").click();
  });
  document.getElementById("chunkFileInput").addEventListener("change", e => {
    const files = e.target.files;
    if (!files.length) return;
    let loaded = 0;
    const processNext = (idx) => {
      if (idx >= files.length) {
        renderChunkLibrary();
        document.getElementById("chunkPanel").classList.add("open");
        return;
      }
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.rows && data.width && data.height && data.id) {
            loadedChunks.push(data);
            loaded++;
          }
        } catch(_) {}
        processNext(idx + 1);
      };
      reader.readAsText(files[idx]);
    };
    processNext(0);
    e.target.value = "";
  });

  // Clear chunks
  document.getElementById("clearChunksBtn").addEventListener("click", () => {
    loadedChunks = [];
    selChunk = null;
    renderChunkLibrary();
  });

  // Export
  const exportArea = document.getElementById("exportArea");
  const overlay = document.getElementById("overlay");
  document.getElementById("exportBtn").addEventListener("click", () => {
    document.getElementById("exportText").value = exportMap();
    document.getElementById("exportTitle").textContent = "Export Map (" + w + "\u00D7" + h + ")";
    exportArea.classList.add("show");
    overlay.classList.add("show");
  });
  document.getElementById("closeExportBtn").addEventListener("click", () => {
    exportArea.classList.remove("show");
    overlay.classList.remove("show");
  });
  overlay.addEventListener("click", () => {
    exportArea.classList.remove("show");
    overlay.classList.remove("show");
  });
  document.getElementById("copyBtn").addEventListener("click", () => {
    const ta = document.getElementById("exportText");
    ta.select();
    document.execCommand("copy");
  });
  document.getElementById("downloadBtn").addEventListener("click", () => {
    const blob = new Blob([document.getElementById("exportText").value], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "custom_map.json";
    a.click();
  });

  // Load map
  document.getElementById("loadMapBtn").addEventListener("click", () => {
    document.getElementById("mapFileInput").click();
  });
  document.getElementById("mapFileInput").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (loadMapJSON(data)) {
          renderGrid();
          exportArea.classList.remove("show");
          overlay.classList.remove("show");
        }
      } catch(err) {
        alert("Error loading map: " + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  });

  // Load custom tiles
  document.getElementById("loadTilesBtn").addEventListener("click", () => {
    document.getElementById("tilesInput").click();
  });
  document.getElementById("tilesInput").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const arr = data.tiles && Array.isArray(data.tiles) ? data.tiles : (Array.isArray(data) ? data : null);
        if (!arr || arr.length === 0) { alert("No tiles found in JSON"); return; }
        let added = 0;
        arr.forEach(t => {
          if (!t.id || !t.glyph) return;
          if (tileMap[t.id]) return;
          const glyph = t.glyph && t.glyph.length > 0 ? t.glyph[0] : "*";
          const tile = {
            id: t.id, g: glyph, c: t.color || "#888888",
            pa: t.passable !== false, op: !!t.opaque, de: t.destructible !== false,
            cv: t.cover || 0, desc: t.desc || t.name || t.id
          };
          tileMap[t.id] = tile;
          customTiles.push(tile);
          added++;
        });
        if (added > 0) { renderTileList(); selectTile(selTile.id); }
      } catch(err) { alert("Error loading tiles: " + err.message); }
    };
    reader.readAsText(file);
    e.target.value = "";
  });
});
</script>
</body>
</html>
