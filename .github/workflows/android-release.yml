name: Android Release

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_type: ${{ steps.btype.outputs.type }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build Go .aar library
        run: |
          mkdir -p android/app/libs
          gomobile bind \
            -target=android \
            -androidapi 21 \
            -o android/app/libs/termcom.aar \
            -ldflags="-X github.com/taislin/termcom/internal/engine.GameVersion=$(cat VERSION)" \
            ./android/

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Determine build type
        id: btype
        run: echo "type=${{ github.event.inputs.build_type }}" >> "$GITHUB_OUTPUT"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK
        uses: gradle/gradle-build-action@v3
        with:
          build-root-directory: android
          gradle-version: 8.2
          arguments: ${{ steps.btype.outputs.type == 'release' && 'assembleRelease' || 'assembleDebug' }}

      - name: Sign Release APK
        if: steps.btype.outputs.type == 'release' && env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > keystore.jks
          UNSIGNED=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner -type f | sort | tail -1)
          "$APKSIGNER" sign \
            --ks keystore.jks \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass pass:"$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass pass:"$ANDROID_KEY_PASSWORD" \
            --out app-release.apk \
            "$UNSIGNED"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: termcom-${{ steps.btype.outputs.type }}-${{ github.sha }}
          path: |
            android/app/build/outputs/apk/**/*.apk
            app-release.apk
          if-no-files-found: error

  tag-release:
    if: needs.build.outputs.build_type == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: termcom-release-${{ github.sha }}
          path: apks

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          name: Android v${{ env.VERSION }}
          files: apks/**/*.apk
          generate_release_notes: true
