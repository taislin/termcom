name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Pandoc and LaTeX
        run: sudo apt-get update && sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended

      - name: Install typography fonts
        # The PDF build requests "Space Grotesk" and "NovaMono" via fontspec;
        # neither ships with texlive, so fetch the TTFs and register them with
        # fontconfig so xelatex can resolve them by family name.
        run: |
          mkdir -p "$HOME/.fonts"
          curl -fsSL -o "$HOME/.fonts/SpaceGrotesk.ttf" "https://github.com/google/fonts/raw/main/ofl/spacegrotesk/SpaceGrotesk%5Bwght%5D.ttf"
          curl -fsSL -o "$HOME/.fonts/NovaMono.ttf" "https://github.com/google/fonts/raw/main/ofl/novamono/NovaMono.ttf"
          fc-cache -f "$HOME/.fonts"

      - name: Build PDFs
        run: |
          mkdir -p pdfs
          VER=$(cat VERSION)
          # Fix: removed undefined \sectionrule and simplified fontspec usage.
          # fontspec is loaded automatically by xelatex/pandoc when mainfont is set.
          pandoc docs/manual.md -o "pdfs/termcom-manual-v${VER}.pdf" --pdf-engine=xelatex --number-sections \
            -V mainfont="Space Grotesk" \
            -V monofont="NovaMono" \
            -V geometry:margin=1in \
            -V header-includes="\usepackage{sectsty}\allsectionsfont{\fontspec{NovaMono}\Large}"
          pandoc docs/quickstart.md -o "pdfs/termcom-quickstart-v${VER}.pdf" --pdf-engine=xelatex --number-sections \
            -V mainfont="Space Grotesk" \
            -V monofont="NovaMono" \
            -V geometry:margin=1in \
            -V header-includes="\usepackage{sectsty}\allsectionsfont{\fontspec{NovaMono}\Large}"

      - name: Upload PDFs
        uses: actions/upload-artifact@v7
        with:
          name: pdfs
          path: pdfs

  build:
    needs: [docs]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            goos: windows
            goarch: amd64
            ext: .exe
            runner: ubuntu-latest
          - os: linux
            arch: amd64
            goos: linux
            goarch: amd64
            ext: ""
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            goos: linux
            goarch: arm64
            ext: ""
            runner: ubuntu-24.04-arm
          - os: macos
            arch: arm64
            goos: darwin
            goarch: arm64
            ext: ""
            runner: ubuntu-latest
          - os: macos
            arch: amd64
            goos: darwin
            goarch: amd64
            ext: ""
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install ALSA dev headers
        run: |
          for i in 1 2 3 4 5; do
            if sudo apt-get update && sudo apt-get install -y --fix-missing libasound2-dev; then
              echo "libasound2-dev installed on attempt $i"
              break
            fi
            echo "apt attempt $i failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
          # Verify the headers are present so a silent failure doesn't break the build later.
          pkg-config --exists alsa || sudo apt-get install -y --fix-missing libasound2-dev

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.25'

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY="termcom${{ matrix.ext }}"
          DIR="termcom_${{ env.VERSION }}_${{ matrix.os }}_${{ matrix.arch }}"
          mkdir -p "$DIR"
          go build -ldflags="-s -w -X github.com/taislin/termcom/internal/engine.GameVersion=${{ env.VERSION }}" -trimpath -o "$DIR/$BINARY" ./cmd/termcom
          cp -r maps "$DIR/"

      - name: Download and include PDFs
        uses: actions/download-artifact@v8
        with:
          name: pdfs
          path: termcom_${{ env.VERSION }}_${{ matrix.os }}_${{ matrix.arch }}

      - name: Package (Windows)
        if: matrix.os == 'windows'
        run: |
          DIR="termcom_${{ env.VERSION }}_${{ matrix.os }}_${{ matrix.arch }}"
          zip -r "$DIR.zip" "$DIR"

      - name: Package (Unix)
        if: matrix.os != 'windows'
        run: |
          DIR="termcom_${{ env.VERSION }}_${{ matrix.os }}_${{ matrix.arch }}"
          tar czf "$DIR.tar.gz" "$DIR"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: termcom_${{ env.VERSION }}_${{ matrix.os }}_${{ matrix.arch }}
          path: termcom_${{ env.VERSION }}_${{ matrix.os }}_${{ matrix.arch }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          draft: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
