name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc and LaTeX
        run: sudo apt-get update && sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended

      - name: Build PDFs
        run: |
          mkdir -p pdfs
          pandoc docs/manual.md -o pdfs/manual.pdf --pdf-engine=xelatex -V mainfont="DejaVu Sans Mono"
          pandoc docs/quickstart.md -o pdfs/quickstart.pdf --pdf-engine=xelatex -V mainfont="DejaVu Sans Mono"

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: pdfs

  build:
    needs: [docs]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            goos: windows
            goarch: amd64
            ext: .exe
          - os: linux
            arch: amd64
            goos: linux
            goarch: amd64
            ext: ""
          - os: linux
            arch: arm64
            goos: linux
            goarch: arm64
            ext: ""
          - os: linux
            arch: arm
            goos: linux
            goarch: arm
            ext: ""
          - os: macos
            arch: arm64
            goos: darwin
            goarch: arm64
            ext: ""
          - os: macos
            arch: amd64
            goos: darwin
            goarch: amd64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install ALSA dev headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY="termcom_${{ env.VERSION }}_${{ matrix.os }}_${{ matrix.arch }}${{ matrix.ext }}"
          DIR="termcom_${{ env.VERSION }}_${{ matrix.os }}_${{ matrix.arch }}"
          go build -ldflags="-s -w" -trimpath -o "$BINARY" ./cmd/termcom
          mkdir -p "$DIR"
          mv "$BINARY" "$DIR/"
          cp -r maps "$DIR/"

      - name: Download and include PDFs
        uses: actions/download-artifact@v4
        with:
          name: pdfs
          path: termcom_${{ env.VERSION }}_${{ matrix.os }}_${{ matrix.arch }}

      - name: Package (Windows)
        if: matrix.os == 'windows'
        run: |
          DIR="termcom_${{ env.VERSION }}_${{ matrix.os }}_${{ matrix.arch }}"
          zip -r "$DIR.zip" "$DIR"

      - name: Package (Unix)
        if: matrix.os != 'windows'
        run: |
          DIR="termcom_${{ env.VERSION }}_${{ matrix.os }}_${{ matrix.arch }}"
          tar czf "$DIR.tar.gz" "$DIR"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: termcom_${{ env.VERSION }}_${{ matrix.os }}_${{ matrix.arch }}
          path: termcom_${{ env.VERSION }}_${{ matrix.os }}_${{ matrix.arch }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          draft: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
