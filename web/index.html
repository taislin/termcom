<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>termcom - ASCII X-COM Demake</title>
    <meta name="description" content="termcom: ASCII X-COM demake running in the browser">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #0d0d1a;
            overflow: hidden;
            font-family: monospace;
        }

        #header {
            text-align: center;
            padding: 6px 0 4px;
            background: #0d0d1a;
            border-bottom: 1px solid #1e1e3a;
            flex-shrink: 0;
        }

        #header h1 {
            color: #e94560;
            font-size: 18px;
            letter-spacing: 4px;
            font-family: monospace;
        }

        #header p {
            color: #555;
            font-size: 11px;
            margin-top: 2px;
        }

        #layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #terminal-wrap {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: stretch;
        }

        #terminal {
            flex: 1;
        }

        /* xterm viewport fill */
        .xterm {
            height: 100% !important;
        }

        .xterm-viewport {
            overflow-y: hidden !important;
        }

        #status {
            text-align: center;
            padding: 3px 0;
            font-size: 11px;
            color: #888;
            background: #0d0d1a;
            border-top: 1px solid #1e1e3a;
            flex-shrink: 0;
        }

        #status.connected {
            color: #0f0;
        }

        #status.disconnected {
            color: #f00;
        }
    </style>
</head>

<body>
    <div id="layout">
        <div id="header">
            <h1>termcom</h1>
        </div>
        <div id="terminal-wrap">
            <div id="terminal"></div>
        </div>
        <div id="status" class="disconnected">Connecting...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script>
        const terminal = new Terminal({
            cursorBlink: false,
            fontSize: 12,
            fontFamily: '"Cascadia Code", "Fira Code", "Lucida Console", "Courier New", monospace',
            allowProposedApi: true,
            convertEol: false,
            scrollback: 0,
            theme: {
                background: '#0d0d1a',
                foreground: '#cccccc',
                cursor: '#e94560',
                selectionBackground: 'rgba(233,69,96,0.3)',
                black: '#0d0d1a',
                red: '#e94560',
                green: '#1db954',
                yellow: '#f0c040',
                blue: '#4a90d9',
                magenta: '#b068d9',
                cyan: '#30b0c0',
                white: '#cccccc',
                brightBlack: '#444466',
                brightRed: '#ff6080',
                brightGreen: '#40e080',
                brightYellow: '#ffe060',
                brightBlue: '#70b8ff',
                brightMagenta: '#d090ff',
                brightCyan: '#60d8e8',
                brightWhite: '#ffffff',
            }
        });

        const fitAddon = new FitAddon.FitAddon();
        terminal.loadAddon(fitAddon);
        terminal.open(document.getElementById('terminal'));
        fitAddon.fit();

        const statusEl = document.getElementById('status');
        let ws = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 10;

        function sendSize() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'resize',
                    cols: terminal.cols,
                    rows: terminal.rows
                }));
            }
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => {
                statusEl.textContent = 'Connected';
                statusEl.className = 'connected';
                reconnectAttempts = 0;
                sendSize();
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'output') {
                        terminal.write(data.data);
                    }
                } catch (e) {
                    // ignore parse errors
                }
            };

            ws.onclose = () => {
                statusEl.textContent = 'Disconnected – Reconnecting...';
                statusEl.className = 'disconnected';
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    setTimeout(connect, 1000 * Math.min(reconnectAttempts, 5));
                } else {
                    statusEl.textContent = 'Disconnected – Refresh to retry';
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        // Forward keyboard input to server as raw terminal sequences.
        terminal.onData((data) => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'input', data: data }));
            }
        });

        // Notify server on resize.
        terminal.onResize(({ cols, rows }) => {
            sendSize();
        });

        // Refit on window resize.
        window.addEventListener('resize', () => {
            fitAddon.fit();
        });

        connect();
        terminal.focus();
    </script>
</body>

</html>
