<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>termcom - ASCII X-COM Demake</title>
    <meta name="description" content="termcom: ASCII X-COM demake running in the browser">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #0d0d1a;
            overflow: hidden;
            font-family: monospace;
        }

        #header {
            text-align: center;
            padding: 6px 0 4px;
            background: #0d0d1a;
            border-bottom: 1px solid #1e1e3a;
            flex-shrink: 0;
        }

        #header h1 {
            color: #e94560;
            font-size: 18px;
            letter-spacing: 4px;
            font-family: monospace;
        }

        #header p {
            color: #555;
            font-size: 11px;
            margin-top: 2px;
        }

        #gallery {
            background: #0d0d1a;
            border-bottom: 1px solid #1e1e3a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            height: 220px;
        }

        #gallery img {
            max-height: 200px;
            max-width: 90%;
            object-fit: contain;
            border: 1px solid #1e1e3a;
            border-radius: 4px;
            display: none;
        }

        #gallery img.active {
            display: block;
        }

        .gallery-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(13, 13, 26, 0.8);
            color: #e94560;
            border: 1px solid #333;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 4px;
            z-index: 2;
            font-family: monospace;
        }

        .gallery-btn:hover {
            background: rgba(233, 69, 96, 0.2);
        }

        #gallery-prev { left: 8px; }
        #gallery-next { right: 8px; }

        #gallery-dots {
            position: absolute;
            bottom: 6px;
            display: flex;
            gap: 6px;
        }

        .gallery-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
            cursor: pointer;
            border: none;
        }

        .gallery-dot.active {
            background: #e94560;
        }

        #layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #terminal-wrap {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: stretch;
        }

        #terminal {
            flex: 1;
        }

        /* xterm viewport fill */
        .xterm {
            height: 100% !important;
        }

        .xterm-viewport {
            overflow-y: hidden !important;
        }

        #status {
            text-align: center;
            padding: 3px 0;
            font-size: 11px;
            color: #888;
            background: #0d0d1a;
            border-top: 1px solid #1e1e3a;
            flex-shrink: 0;
        }

        #status.connected {
            color: #0f0;
        }

        #status.disconnected {
            color: #f00;
        }
    </style>
</head>

<body>
    <div id="layout">
        <div id="header">
            <h1>termcom</h1>
        </div>
        <div id="gallery">
            <button class="gallery-btn" id="gallery-prev">&#8249;</button>
            <img src="screenshots/battlescape.png" class="active" alt="Battlescape">
            <img src="screenshots/battlescape_alien.png" alt="Battlescape Alien">
            <img src="screenshots/geoscape.png" alt="Geoscape">
            <img src="screenshots/encyclopedia.png" alt="Encyclopedia">
            <img src="screenshots/plane_designer.png" alt="Plane Designer">
            <img src="screenshots/aar.png" alt="After Action Report">
            <button class="gallery-btn" id="gallery-next">&#8250;</button>
            <div id="gallery-dots"></div>
        </div>
        <div id="terminal-wrap">
            <div id="terminal"></div>
        </div>
        <div id="status" class="disconnected">Connecting...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script>
        const terminal = new Terminal({
            cursorBlink: false,
            fontSize: 12,
            fontFamily: '"Cascadia Code", "Fira Code", "Lucida Console", "Courier New", monospace',
            allowProposedApi: true,
            convertEol: false,
            scrollback: 0,
            theme: {
                background: '#0d0d1a',
                foreground: '#cccccc',
                cursor: '#e94560',
                selectionBackground: 'rgba(233,69,96,0.3)',
                black: '#0d0d1a',
                red: '#e94560',
                green: '#1db954',
                yellow: '#f0c040',
                blue: '#4a90d9',
                magenta: '#b068d9',
                cyan: '#30b0c0',
                white: '#cccccc',
                brightBlack: '#444466',
                brightRed: '#ff6080',
                brightGreen: '#40e080',
                brightYellow: '#ffe060',
                brightBlue: '#70b8ff',
                brightMagenta: '#d090ff',
                brightCyan: '#60d8e8',
                brightWhite: '#ffffff',
            }
        });

        const fitAddon = new FitAddon.FitAddon();
        terminal.loadAddon(fitAddon);
        terminal.open(document.getElementById('terminal'));
        fitAddon.fit();

        const statusEl = document.getElementById('status');
        let ws = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 10;

        function sendSize() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'resize',
                    cols: terminal.cols,
                    rows: terminal.rows
                }));
            }
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => {
                statusEl.textContent = 'Connected';
                statusEl.className = 'connected';
                reconnectAttempts = 0;
                sendSize();
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'output') {
                        terminal.write(data.data);
                    }
                } catch (e) {
                    // ignore parse errors
                }
            };

            ws.onclose = () => {
                statusEl.textContent = 'Disconnected – Reconnecting...';
                statusEl.className = 'disconnected';
                if (reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    setTimeout(connect, 1000 * Math.min(reconnectAttempts, 5));
                } else {
                    statusEl.textContent = 'Disconnected – Refresh to retry';
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        // Forward keyboard input to server as raw terminal sequences.
        terminal.onData((data) => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'input', data: data }));
            }
        });

        // Touch → mouse event conversion for mobile play.
        function touchToCell(touch) {
            const el = document.getElementById('terminal');
            const rect = el.getBoundingClientRect();
            const px = touch.clientX - rect.left;
            const py = touch.clientY - rect.top;
            const cellW = rect.width / terminal.cols;
            const cellH = rect.height / terminal.rows;
            return {
                x: Math.floor(px / cellW),
                y: Math.floor(py / cellH)
            };
        }

        function sendMouse(x, y, button) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'mouse', x: x, y: y, data: button }));
            }
        }

        let lastTapTime = 0;
        const tapCooldown = 150;
        let longPressTimer = null;
        let touchStartCell = null;
        const longPressDelay = 500;

        const termEl = document.getElementById('terminal');
        termEl.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const cell = touchToCell(touch);
            touchStartCell = cell;
            const now = Date.now();
            if (now - lastTapTime < tapCooldown) {
                return;
            }
            lastTapTime = now;
            longPressTimer = setTimeout(() => {
                sendMouse(cell.x, cell.y, 'right');
                longPressTimer = null;
            }, longPressDelay);
            sendMouse(cell.x, cell.y, 'left');
        }, { passive: false });

        termEl.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
            // Convert vertical drag to scroll events
            if (touchStartCell && e.touches.length > 0) {
                const cur = touchToCell(e.touches[0]);
                const dy = cur.y - touchStartCell.y;
                if (Math.abs(dy) >= 2) {
                    if (dy > 0) {
                        sendMouse(0, 0, 'scroll_down');
                    } else {
                        sendMouse(0, 0, 'scroll_up');
                    }
                    touchStartCell = cur;
                }
            }
        }, { passive: false });

        termEl.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        }, { passive: false });

        // Notify server on resize.
        terminal.onResize(({ cols, rows }) => {
            sendSize();
        });

        // Refit on window resize.
        window.addEventListener('resize', () => {
            fitAddon.fit();
        });

        // ── Screenshot carousel ──────────────────────────────────────────
        const galleryImgs = document.querySelectorAll('#gallery img');
        const dotsContainer = document.getElementById('gallery-dots');
        let galleryIdx = 0;
        let galleryTimer = null;

        galleryImgs.forEach((_, i) => {
            const dot = document.createElement('button');
            dot.className = 'gallery-dot' + (i === 0 ? ' active' : '');
            dot.addEventListener('click', () => showGallery(i));
            dotsContainer.appendChild(dot);
        });

        function showGallery(idx) {
            galleryImgs[galleryIdx].classList.remove('active');
            dotsContainer.children[galleryIdx].classList.remove('active');
            galleryIdx = (idx + galleryImgs.length) % galleryImgs.length;
            galleryImgs[galleryIdx].classList.add('active');
            dotsContainer.children[galleryIdx].classList.add('active');
        }

        function startGalleryTimer() {
            clearInterval(galleryTimer);
            galleryTimer = setInterval(() => showGallery(galleryIdx + 1), 4000);
        }

        document.getElementById('gallery-prev').addEventListener('click', () => {
            showGallery(galleryIdx - 1);
            startGalleryTimer();
        });

        document.getElementById('gallery-next').addEventListener('click', () => {
            showGallery(galleryIdx + 1);
            startGalleryTimer();
        });

        startGalleryTimer();
        // ── End carousel ─────────────────────────────────────────────────

        connect();
        terminal.focus();
    </script>
</body>

</html>
